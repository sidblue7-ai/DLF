<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyEstates - Find Your Dream Property</title>

  <meta name="description" content="KeyEstates helps you find luxury apartments in Kolkata.">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="property1.css">
</head>
<body>

<header class="navbar">
  <div class="logo">KeyEstates</div>
  <nav>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#properties">Properties</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><a href="https://www.linkedin.com/in/siddharth-gupta-225280100/?originalSubdomain=in" target="_blank">LinkedIn</a></li>
    </ul>
    <div class="menu-toggle">☰</div>
  </nav>
</header>

<section id="home" class="hero">
  <div>
    <h1>Find Your Dream Home</h1>
    <p>Premium Properties in Kolkata</p>
    <a href="#properties" class="btn">Explore Properties</a>
  </div>
</section>

<section id="properties" class="properties">
  <h2>Featured Properties</h2>
  <div class="property-grid" id="propertyGrid"></div>
</section>

<section id="contact" class="contact">
  <h2>Book a Visit</h2>
  <form id="contactForm">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit" class="btn">Submit</button>
  </form>
</section>

<footer class="footer">
  <p>© 2026 KeyEstates | All Rights Reserved</p>
</footer>

<script src="property1.js"></script>
</body>
</html>
